<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        .navbar {
            background: #0d1b2a;
        }

        .navbar-brand {
            color: white;
            font-weight: bold;
        }

        .nav-link {
            color: white !important;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        .title {
            font-size: 26px;
            font-weight: bold;
        }

        .subtitle {
            color: gray;
            font-size: 14px;
        }

        .btn-custom {
            background: #28a745;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #1e7e34;
        }
        /* Mobile Responsive */

@media (max-width: 768px) {

    .title {
        font-size: 22px;
    }

    .subtitle {
        font-size: 13px;
    }

    .card {
        margin: 10px;
        padding: 20px !important;
    }

    .navbar .container {
        flex-direction: column;
        text-align: center;
    }

    .ms-auto {
        margin-top: 10px;
    }

    .nav-link {
        display: block !important;
        margin: 5px 0;
    }
}

@media (max-width: 480px) {

    .title {
        font-size: 20px;
    }

    .card {
        width: 100%;
        max-width: 100% !important;
    }

    textarea {
        min-height: 120px;
    }

    .btn-custom {
        font-size: 14px;
    }
}
    </style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand">📊 Resume Ranker</span>

        <div class="ms-auto">
            <a href="/history" class="nav-link d-inline">📂 History</a>
            <a href="/logout" class="nav-link d-inline">🚪 Logout</a>
        </div>
    </div>
</nav>

<!-- 🔷 MAIN CONTENT -->
<div class="container mt-5">

<div class="card p-4 mx-auto w-100" style="max-width: 500px;">
        <div class="text-center mb-3">
            <div class="title">🚀 Resume Analyzer</div>
            <div class="subtitle">Upload your resume and match with job description</div>
        </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div style="
                background:#ffebee;
                color:#c62828;
                padding:12px;
                margin-bottom:15px;
                border-radius:8px;
                font-weight:bold;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
        <form method="POST" enctype="multipart/form-data">

            <!-- Job Description -->
            <label class="form-label fw-bold">Job Description</label>
            <textarea class="form-control mb-3"
                name="job_desc"
                placeholder="Paste Job Description (Python, SQL, Data Analyst...)"
                required></textarea>

            <!-- Resume Upload -->
            <label class="form-label fw-bold">Upload Resume</label>
            <input type="file" class="form-control mb-3" name="resume" required>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-custom w-100">
                🚀 Analyze Resume
            </button>

        </form>

    </div>

</div>

</body>
</html>
